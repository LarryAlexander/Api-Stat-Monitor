name: 🤖 Stale Issues & PRs

on:
  schedule:
    # Run every day at 1:00 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and Close Stale Items
    runs-on: ubuntu-latest
    steps:
      - name: Handle stale issues and PRs
        uses: actions/stale@v10
        with:
          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 14
          stale-issue-label: 'stale'
          stale-issue-message: >
            👋 This issue has been inactive for **30 days**.
            If it's still relevant, please leave a comment or update it with additional context.
            It will be closed in **14 days** if there's no further activity.
          close-issue-message: >
            🔒 This issue has been automatically closed due to inactivity.
            Feel free to reopen it if the problem persists or if you have more information.

          # Pull Requests
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: >
            👋 This pull request has been inactive for **14 days**.
            Please address any outstanding review comments or rebase if needed.
            It will be closed in **7 days** if there's no further activity.
          close-pr-message: >
            🔒 This pull request has been automatically closed due to inactivity.
            Feel free to reopen it when you're ready to continue.

          # Never mark these labels as stale
          exempt-issue-labels: 'pinned,security,bug,in-progress,blocked'
          exempt-pr-labels: 'pinned,security,in-progress,blocked'
          exempt-all-milestones: true
